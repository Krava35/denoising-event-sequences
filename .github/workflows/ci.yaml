name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/ scripts/ tests/

  # ── Unit tests ──────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install CPU-only torch to keep CI fast (no GPU needed for unit tests)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests (excluding slow/integration)
        run: |
          pytest tests/ -m "not slow and not integration" \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Smoke test ──────────────────────────────────────────────────────────────
  smoke:
    name: Smoke test (end-to-end on CPU)
    runs-on: ubuntu-latest
    needs: test   # only run if unit tests pass

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-3.12-smoke-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install -e .

      - name: Run smoke test
        run: |
          pytest tests/ -m "smoke" \
            --tb=short \
            -v \
            --timeout=120
        timeout-minutes: 5

  # ── Config validation ────────────────────────────────────────────────────────
  validate-configs:
    name: Validate YAML configs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Validate all configs are valid YAML
        run: |
          python - << 'EOF'
          import yaml
          from pathlib import Path
          import sys

          errors = []
          for p in Path("configs").rglob("*.yaml"):
              try:
                  with open(p) as f:
                      yaml.safe_load(f)
                  print(f"  OK  {p}")
              except yaml.YAMLError as e:
                  errors.append(f"  FAIL {p}: {e}")
                  print(f"  FAIL {p}: {e}")

          if errors:
              print(f"\n{len(errors)} config(s) failed validation.")
              sys.exit(1)
          else:
              print(f"\nAll configs valid.")
          EOF

  # ── Utils self-test ──────────────────────────────────────────────────────────
  utils-selftest:
    name: Utils self-tests (__main__ blocks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy pyyaml
          pip install -e .

      - name: Run seed utils
        run: python -m src.utils.seed

      - name: Run config utils
        run: python -m src.utils.config

      - name: Run logging utils
        run: python -m src.utils.logging
