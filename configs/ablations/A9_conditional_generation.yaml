# A9: Conditional fixed-K suffix generation via diffusion.
# Trains the A8 denoiser only on future suffix positions conditioned on clean prefix.

pretraining:
  objective: "diffusion"

diffusion:
  num_steps: 100
  timestep_sampling: "uniform"
  beta_start: 0.0001
  beta_end: 0.02
  discrete_mask_fraction: 0.80

generation:
  enabled: true
  mode: "conditional_suffix"
  suffix_len: 16
  prefix_min_ratio: 0.50
  prefix_max_ratio: 0.80
  sampler: "ddim_lite"
  num_sampling_steps: 50
  temperature_event_type: 1.0
  temperature_cat: 1.0
  top_k_event_type: 20
  continuous_update: "x0_eps_blend"

loss:
  lambda_event_type: 1.0
  lambda_time: 1.0
  lambda_num: 0.5
  lambda_cat: 0.5
  lambda_time_eps: 0.1
  lambda_num_eps: 0.1
